name: 月次ダンススケジュール更新

on:
  schedule:
    - cron: '0 14 28-31 * *'
  workflow_dispatch:
    inputs:
      yyyymm:
        description: '対象年月 (例: 202608)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 月末日チェック（scheduleトリガー時のみ）
        if: github.event_name == 'schedule'
        run: |
          TOMORROW=$(date -d '+1 day' +%d)
          if [ "$TOMORROW" != "01" ]; then
            echo "今日は月末日ではありません"
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Node.js セットアップ
        if: env.SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージインストール
        if: env.SKIP != 'true'
        run: cd scripts && npm install

      - name: スケジュールHTML生成
        if: env.SKIP != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_YYYYMM: ${{ github.event.inputs.yyyymm }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: cd scripts && node generate.js

      - name: 生成ファイルをコミット&プッシュ
        if: env.SKIP != 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "auto: スケジュール更新 $(date '+%Y%m')"
            git push
          fi
