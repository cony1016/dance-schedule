name: 月次ダンススケジュール更新

on:
  schedule:
    - cron: '0 14 28-31 * *'
  workflow_dispatch:
    inputs:
      yyyymm:
        description: '対象年月 (例: 202608)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: 月末日チェック（scheduleトリガー時のみ）
        if: github.event_name == 'schedule'
        run: |
          TOMORROW=$(date -d '+1 day' +%d)
          if [ "$TOMORROW" != "01" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Node.js セットアップ
        if: env.SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージインストール
        if: env.SKIP != 'true'
        run: cd scripts && npm install

      - name: スケジュールHTML生成
        if: env.SKIP != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_YYYYMM: ${{ github.event.inputs.yyyymm }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: cd scripts && node generate.js

      - name: 生成ファイルをコミット&プッシュ
        if: env.SKIP != 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            YYYYMM="${{ github.event.inputs.yyyymm }}"
            if [ -z "$YYYYMM" ]; then
              YYYYMM=$(date -d '+1 month' '+%Y%m')
            fi
            git commit -m "auto: ${YYYYMM} スケジュール更新"
            git push
          fi

      - name: 最新コードを取得
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 公開フォルダ作成
        run: |
          mkdir -p _site
          cp -f index.html _site/ 2>/dev/null || true
          cp -f .nojekyll _site/ 2>/dev/null || true
          for dir in [0-9][0-9][0-9][0-9][0-9][0-9]; do
            [ -d "$dir" ] && cp -r "$dir" _site/
          done
          echo "=== _site contents ==="
          find _site -type f | head -20

      - name: Pages設定
        uses: actions/configure-pages@v4

      - name: Pagesアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
