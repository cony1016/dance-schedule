  const key = genre.toLowerCase().replace(/\s+/g, "");
  for (const [k, v] of Object.entries(GENRE_COLORS)) {
    if (key.includes(k.replace(/&/g, "").replace(/\s+/g, ""))) return v;
  }
  return {
    bg: "#94A3B8",
    light: "#F1F5F9",
    text: "#334155"
  };
}

  };
  return null;
}
function ytUrl(song, artist) {

function ClassCard({
  cls
}) {
  const genreKey = cls.genre.toLowerCase().split(" ")[0].replace(/\s/g, "");
  const color = getGenreColor(cls.genre);
  const badge = getLevelBadge(cls.genre);
  const url = ytUrl(cls.song, cls.artist);
  return React.createElement("div", {
    style: {
      background: color.light,
      border: "1px solid " + color.bg,
      borderLeft: "4px solid " + color.bg,
